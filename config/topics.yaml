# ── Topic Categories ───────────────────────────────────────
# These categories help score and label articles.
topic_categories:

  - name: "New AI Feature or Product Launch"
    description: "New product launches, model releases, feature updates"
    keywords:
      - "launch"
      - "release"
      - "new feature"
      - "update"
      - "announced"
      - "ships"
      - "available now"
      - "introduces"
      - "unveils"
      - "rolls out"
      - "debuts"

  - name: "AI Startup Funding"
    description: "Investment rounds, acquisitions, and valuations"
    keywords:
      - "funding"
      - "raises"
      - "Series A"
      - "Series B"
      - "Series C"
      - "seed round"
      - "valuation"
      - "acquired"
      - "acquisition"
      - "investment"
      - "venture capital"
      - "million"
      - "billion"
      - "IPO"
      - "unicorn"

  - name: "AI for Marketing and Brands"
    description: "How brands use AI in marketing, creative, and strategy"
    keywords:
      - "brand"
      - "marketing"
      - "campaign"
      - "creative AI"
      - "AI marketing"
      - "CMO"
      - "advertising"
      - "content creation"
      - "social media AI"

  - name: "AI Research and Breakthroughs"
    description: "Research papers, benchmarks, and capability milestones"
    keywords:
      - "research"
      - "paper"
      - "benchmark"
      - "breakthrough"
      - "study"
      - "capability"
      - "AGI"
      - "reasoning"
      - "multimodal"

  - name: "AI Regulation and Policy"
    description: "Government regulation, AI safety, and ethics"
    keywords:
      - "regulation"
      - "policy"
      - "safety"
      - "ethics"
      - "EU AI Act"
      - "ban"
      - "law"
      - "copyright"
      - "bias"

  - name: "AI Tools and Productivity"
    description: "AI tools for workflows, coding, and productivity"
    keywords:
      - "AI agent"
      - "agentic"
      - "automation"
      - "workflow"
      - "productivity"
      - "coding AI"
      - "AI assistant"
      - "copilot"

  - name: "Human-in-the-Loop AI Experiments"
    description: "First-person accounts of using AI in real workflows — testing, experimenting, learning"
    keywords:
      - "I tried"
      - "I tested"
      - "experiment"
      - "human in the loop"
      - "human-in-the-loop"
      - "AI workflow"
      - "prompt engineering"
      - "using AI for"
      - "AI for marketers"
      - "AI for brands"
      - "AI for creatives"
      - "real world AI"
      - "hands on"
      - "in practice"

  - name: "YouTube Video or Demo Launch"
    description: "AI companies and creators releasing YouTube videos, demos, or tutorials"
    keywords:
      - "youtube"
      - "video"
      - "demo"
      - "watch"
      - "tutorial"
      - "footage"
      - "clip"
      - "live demo"
      - "showcase"

# ── Trending Keywords Configuration ───────────────────────
trending_keywords:
  # Seed terms used to find related trending queries across platforms
  seed_terms:
    - "artificial intelligence"
    - "ChatGPT"
    - "AI tools"
    - "generative AI"
    - "large language model"
    - "AI agent"
    - "Claude AI"
    - "Gemini AI"
    - "AI marketing"
    - "AI for brands"
    - "Perplexity AI"
    - "ElevenLabs"
    - "Midjourney"
    - "AI startup"
    - "AI funding"
  geo: "US"           # Google Trends geography code (US, GB, AU, etc.)
  timeframe: "now 7-d" # last 7 days (options: now 1-d, now 7-d, now 1-m)

# ── Freshness Settings ─────────────────────────────────────
freshness:
  max_article_age_hours: 48   # Only articles published in the last N hours
  min_relevance_score: 2      # Minimum relevance score to include an article
  max_articles_per_run: 25    # Cap how many articles are scored per run
