# ── Optional API Sources ───────────────────────────────────
# These require API keys set in your .env file.
optional_apis:

  newsapi:
    # Get a free key at https://newsapi.org/
    enabled: false   # Set to true after adding NEWSAPI_KEY to .env
    queries:
      - query: "artificial intelligence OR ChatGPT OR Claude AI OR Gemini"
        sort_by: "publishedAt"
        language: "en"
      - query: "AI startup funding raise investment"
        sort_by: "publishedAt"
        language: "en"
      - query: "generative AI marketing brand"
        sort_by: "publishedAt"
        language: "en"
    max_results_per_query: 20
