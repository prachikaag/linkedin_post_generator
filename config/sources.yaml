# ============================================================
# NEWS SOURCES
# Edit this file to add or remove RSS feeds and APIs.
# Priority: high = fetched first, low = fetched if time permits.
# Set enabled: false to skip any feed without deleting it.
# ============================================================

rss_feeds:

  # ── General AI News ─────────────────────────────────────
