# --- NewsAPI Configuration (requires NEWSAPI_KEY in .env) ---
newsapi:
  enabled: true
  queries:
    - "artificial intelligence"
    - "AI startup funding"
    - "generative AI"
    - "large language model"
    - "AI tools"
  sources:
    - techcrunch
    - the-verge
    - wired
    - ars-technica
    - engadget
  language: en
  sort_by: publishedAt  # relevancy, popularity, publishedAt
  page_size: 20

# --- Google News RSS Queries ---
# These are Google News RSS URLs for specific search queries
google_news_queries:
  - query: "AI product launch"
    url: "https://news.google.com/rss/search?q=AI+product+launch&hl=en-US&gl=US&ceid=US:en"

  - query: "AI startup funding 2024"
    url: "https://news.google.com/rss/search?q=AI+startup+funding&hl=en-US&gl=US&ceid=US:en"

  - query: "ChatGPT new feature"
    url: "https://news.google.com/rss/search?q=ChatGPT+new+feature&hl=en-US&gl=US&ceid=US:en"

  - query: "Claude Anthropic update"
    url: "https://news.google.com/rss/search?q=Anthropic+Claude+update&hl=en-US&gl=US&ceid=US:en"

  - query: "Gemini Google AI"
    url: "https://news.google.com/rss/search?q=Gemini+Google+AI+launch&hl=en-US&gl=US&ceid=US:en"

  - query: "AI brand marketing"
    url: "https://news.google.com/rss/search?q=AI+brand+marketing&hl=en-US&gl=US&ceid=US:en"

# --- Fetch Settings ---
fetch_settings:
  max_articles_per_source: 10
  max_article_age_days: 7        # Only fetch articles published in the last N days
  request_timeout_seconds: 10
  retry_attempts: 2
  deduplicate: true              # Skip articles already in data/seen_articles.json
