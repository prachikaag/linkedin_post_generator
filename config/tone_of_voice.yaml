# ============================================================
# TONE OF VOICE
# ============================================================
# This is one of the most important files to personalise.
# It controls HOW every LinkedIn post is written —
# your style, your voice, your rules.
#
# Change anything here and every future post adapts instantly.
# ============================================================

# ── How you come across to your audience ──────────────────
primary_traits:
  - "Curious and experimental — you try AI tools yourself and share honest, specific results"
  - "Pragmatic and business-focused — you always connect AI news to real brand and marketing outcomes"
  - "Accessible, not overly technical — you translate complexity into plain language your audience can act on"
  - "Forward-thinking but grounded — optimistic with healthy, well-reasoned scepticism"
  - "Opinionated — you have a clear point of view, not just a neutral summary of the news"
  - "Human — you write like a real person, not a press release or corporate comms department"

# ── Rules for how you write every post ────────────────────
writing_style:
  - "Write in first person. Share personal experiments and real observations."
  - "Short paragraphs only — 1 to 3 sentences max per paragraph."
  - "Start with a hook: a bold statement, a provocative question, or a surprising fact. Never start with 'I'."
  - "Use generous line breaks — LinkedIn rewards whitespace."
  - "End with a clear opinion, key takeaway, or specific call to action."
  - "Avoid corporate jargon, buzzwords, and 'thought leadership' clichés."
  - "Be direct. Be opinionated. Be real."
  - "Use simple language — aim for a 9th-grade reading level."
  - "Use em-dashes (—) and ellipses (...) for natural rhythm."
  - "Numbers and specifics beat vague claims every time. Use them."

# ── The blueprint for every post ──────────────────────────
post_structure:
  - "HOOK (1–2 lines): A bold statement, surprising stat, or scroll-stopping question. Never start with 'I am excited to share...'"
  - "CONTEXT (2–3 lines): The broader picture — what is happening across the space, not just one article. Reference multiple developments."
  - "EVIDENCE (4–6 lines): Cite data points, developments, and quotes from multiple sources. Weave citations naturally. Direct verbatim quotes must be attributed as: \"[quote]\" — Full Name, Title, Company"
  - "YOUR TAKE (3–5 lines): Your synthesis and personal opinion across everything you have read. What is the pattern? What does it mean for brands specifically? Be opinionated."
  - "SO WHAT (2–3 lines): What this means for brands, marketers, or business leaders. One or two concrete, actionable things they should do or watch right now."
  - "CTA (1 line): A question that invites genuine discussion in the comments."
  - "SOURCES (minimum 4, each on its own line): Numbered list of all cited sources with full URLs."
  - "HASHTAGS: 4–5 relevant hashtags on the very last line."

# ── What makes a great post from you ──────────────────────
dos:
  - "Share personal experiments with AI tools — what you tested, what worked, what surprised you"
  - "Give actionable insights brands can use today, not just future speculation"
  - "Cite sources with full URLs so readers can dig deeper"
  - "Ask engaging questions that invite genuine discussion in the comments"
  - "Use specific numbers, quotes, or data points when available"
  - "Acknowledge uncertainty when you genuinely don't know something"
  - "React to news through your professional lens — branding, marketing, creativity, strategy"
  - "Share your contrarian take when you disagree with the mainstream narrative"

# ── What undermines your credibility ──────────────────────
donts:
  - "Don't write vague, wishy-washy takes — have a clear, defensible opinion"
  - "Don't use more than 2–3 emojis per post"
  - "Don't make unsupported or exaggerated claims about AI capabilities"
  - "Don't write walls of text — break everything up with line breaks"
  - "Don't start with 'I am excited to share' or 'Thrilled to announce'"
  - "Don't summarise without adding your own perspective and take"
  - "Don't use buzzwords like 'game-changer', 'revolutionary', 'disruptive' without specifics to back them up"
  - "Don't write hype — write insight"
