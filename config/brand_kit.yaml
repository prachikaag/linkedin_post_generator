# ============================================================
# BRAND KIT
# ============================================================
# Who you are, what you write about, your hashtag strategy,
# and your research standards.
#
# Your writing style and tone are in config/tone_of_voice.yaml
# ============================================================

# ── Who You Are ───────────────────────────────────────────
author:
  name: "Your Name"
  title: "Your Professional Title"
  # One sentence that describes who you are and what you do
  tagline: "Helping brands understand and leverage AI in the real world"
  location: "Your City, Country"
  industries:
    - "Marketing & Brand Strategy"
    - "Artificial Intelligence"
    - "Digital Innovation"

# ── Your Brand Focus ───────────────────────────────────────
brand:

  # The lenses you always write through — every post should
  # connect back to at least one of these.
  focus_areas:
    - "Practical AI tools for marketing and brand building"
    - "Human-in-the-loop AI workflows — you as the editor, AI as the drafter"
    - "Future of creative work with generative AI"
    - "AI strategy and literacy for marketing teams and brand leaders"
    - "The AI startup ecosystem and what it means for brands and agencies"
    - "Experimenting with AI in your own work and sharing honest results"

  # The post angles that resonate most with your audience.
  # These are prompts for yourself — the post generator uses
  # post_templates.yaml for AI-driven angle selection.
  content_angles:
    - "I tried [AI tool] for [use case] — here's what actually happened"
    - "[Company] just launched [feature] — here's what brands should know"
    - "The real reason [AI development] matters for marketers"
    - "[Trending topic] explained without the hype"
    - "What [funding/acquisition] tells us about where AI is heading"
    - "Most people saw [X]. Here's what I think they missed."

  # Hashtag strategy
  hashtags:
    # Always included in every post
    always_include:
      - "#AI"
      - "#ArtificialIntelligence"
    # Generator picks from this list to fill remaining slots
    rotate_from:
      - "#GenerativeAI"
      - "#AITools"
      - "#MarketingAI"
      - "#AIMarketing"
      - "#FutureOfWork"
      - "#BrandStrategy"
      - "#AIInnovation"
      - "#TechNews"
      - "#AIStartup"
      - "#ContentMarketing"
      - "#DigitalMarketing"
      - "#AIForBusiness"
      - "#CreativeAI"
      - "#LLM"
      - "#AIAgent"

  # Total hashtags per post (including always_include)
  max_hashtags: 5

  # Target post length
  # Options: "short" (300–500 chars) | "medium" (500–900 chars) | "long" (900–1300 chars)
  post_length: "medium"

  # Phrases that are distinctly yours — the generator may
  # use these naturally when they fit.
  signature_phrases:
    - "Here's what I think brands are missing..."
    - "The real question is..."
    - "Worth paying attention to."
    - "What does this mean for brands?"
    - "Most people saw the headline. Here's the implication."

# ── Research & Citation Standards ─────────────────────────
# These rules are injected directly into the AI prompt as
# hard, non-negotiable requirements on every post.
research_standards:
  # Minimum number of distinct sources that must be cited
  min_sources: 4

  # How to format a direct verbatim quote
  quote_format: '"[exact quote]" — Full Name, Job Title, Company/Publication'

  # How to format the sources list at the bottom of each post
  source_list_format: "[N]. [Short descriptive title] → [full URL]"

  # If a quote cannot be confirmed as exact, paraphrase instead
  require_verified_quotes: true
