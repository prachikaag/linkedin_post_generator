# ============================================================
# BRAND KIT — WHO YOU ARE
# Edit this file to match your personal brand identity.
#
# This file answers: who are you, what do you stand for,
# and what is your LinkedIn presence about?
#
# For HOW you write (style rules, tone, post structure),
# edit config/tone_of_voice.yaml instead.
# ============================================================

# ── Who You Are ───────────────────────────────────────────
# IMPORTANT: Fill in your real details below.
# These values are injected into every post as your identity.
author:
  name: "Your Name"                          # e.g. "Sarah Chen"
  title: "Your Professional Title"           # e.g. "Brand Strategist & AI Consultant"
  tagline: "Helping brands understand and leverage AI in the real world"
  location: "Your City, Country"             # e.g. "Sydney, Australia"
  industries:
    - "Marketing & Brand Strategy"
    - "Artificial Intelligence"
    - "Digital Innovation"

# ── Your Brand Focus ───────────────────────────────────────
brand:

  # The lenses you always write through — referenced in every post prompt
  focus_areas:
    - "Practical AI tools for marketing and brand building"
    - "Human-in-the-loop AI workflows — you as the editor, AI as the drafter"
    - "Future of creative work with generative AI"
    - "AI strategy and literacy for marketing teams and brand leaders"
    - "The AI startup ecosystem and what it means for brands and agencies"
    - "Experimenting with AI in your own work and sharing honest results"

  # Example post angles — the AI picks the most fitting one per story
  content_angles:
    - "I tried [AI tool] for [use case] — here's what actually happened"
    - "[Company] just launched [feature] — here's what brands should know"
    - "The real reason [AI development] matters for marketers"
    - "[Trending topic] explained without the hype"
    - "What [funding/acquisition] tells us about where AI is heading"

  # Hashtag strategy
  hashtags:
    # Always included in every post — these define your niche
    always_include:
      - "#AI"
      - "#ArtificialIntelligence"
    # Pick 3 from this list to reach max_hashtags total (complement the story topic)
    rotate_from:
      - "#GenerativeAI"
      - "#AITools"
      - "#MarketingAI"
      - "#AIMarketing"
      - "#FutureOfWork"
      - "#BrandStrategy"
      - "#AIInnovation"
      - "#TechNews"
      - "#AIStartup"
      - "#ContentMarketing"
      - "#DigitalMarketing"
      - "#AIForBusiness"
      - "#CreativeAI"
      - "#LLM"
      - "#AIAgent"

  # Total hashtags per post (always_include + rotate_from)
  max_hashtags: 5

  # Target post length — controls how much the AI writes
  # Options: "short" (300-500 chars) | "medium" (500-900 chars) | "long" (900-1300 chars)
  post_length: "medium"

  # Optional: phrases that are distinctly yours — sprinkled in naturally
  signature_phrases:
    - "Here's what I think brands are missing..."
    - "The real question is..."
    - "Worth paying attention to."
    - "What does this mean for brands?"
